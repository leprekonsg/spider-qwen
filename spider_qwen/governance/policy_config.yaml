schema_version: "1.0"

geo:
  default_region: "SEA"
  fallback_region: "global"
  boost_countries:
    - Singapore
    - Malaysia
    - Indonesia
    - Thailand
    - Vietnam
    - Philippines
    - Brunei
    - Cambodia
    - Laos
    - Myanmar

budgets:
  product_exact_price:
    max_search_calls: 4
    max_fetch_urls: 20
    max_candidates_to_extract: 10
    max_validated_candidates: 5
    max_runtime_seconds: 180
    min_validated_candidates: 5
    evidence_completeness_threshold: 0.75
  service_quote_required:
    max_search_calls: 5
    max_fetch_urls: 25
    max_candidates_to_extract: 10
    max_validated_candidates: 5
    max_runtime_seconds: 180
    min_validated_candidates: 3
    evidence_completeness_threshold: 0.65
  contact_enrichment_only:
    max_search_calls: 3
    max_fetch_urls: 15
    max_candidates_to_extract: 10
    max_validated_candidates: 5
    max_runtime_seconds: 120
    min_validated_candidates: 1
    evidence_completeness_threshold: 0.70

privacy:
  review_gate_enabled:
    business_contact: false
    named_person_high_sensitivity: true
  high_sensitivity_fields:
    - named_person_email
    - named_person_phone
    - direct_mobile

# Canonical Qwen model role assignments (build plan section 2). Never hard-code
# model strings in code; resolve through Policy.model_for(<role>). Override any
# role at runtime with env SPIDER_QWEN_MODEL_<ROLE> (e.g. SPIDER_QWEN_MODEL_PLANNER).
# Pin dated snapshots for demo reproducibility; the rolling alias can change
# planner behaviour mid-run.
models:
  planner: "qwen3.7-max"            # planning / reasoning / high-stakes judging (deep-thinking ON, 1M ctx)
  extraction: "qwen3.5-flash"       # extraction / classification / query-variants / reflection (thinking OFF)
  extraction_fallback: "qwen-flash" # fallback when the flash snapshot is unavailable
  embeddings: "text-embedding-v4"   # skills / notes / FFF specs (Matryoshka 768d index, 2048d rerank)
  ocr: "qwen-vl-ocr-2025-11-20"     # datasheet / legacy-book OCR

qwen:
  # Model names live in the models: block above. Legacy router_model /
  # json_extractor_model keys are still honoured if present (backward compat).
  structured_extraction_enabled: false
  router_fallback_enabled: false
  router_confidence_threshold: 0.65
  # T-2.1 page judge gate: score each fetched page (relevance/freshness/authority/
  # contradicts-ledger) and reject/flag low-trust pages before the ledger persists.
  # Heuristic + offline by default; off so the base offline pipeline is unchanged.
  page_judge_enabled: false

verification:
  # T-2.2 verification spine: atomic decomposition -> MiniCheck entailment ->
  # SAFE re-verification. Blocks candidates whose critical claims are not grounded
  # in their cited evidence. Heuristic + offline by default; off so the base
  # offline pipeline is unchanged. Env SPIDER_QWEN_VERIFICATION_ENABLED.
  enabled: false

rfq:
  allow_vendor_submission: false
  default_tone: "SEA-neutral professional English; short and direct"
  minimum_checklist_completeness: 0.65

memory:
  semantic_promotion_requires_evidence: true
  allow_disputed_facts_in_rfq: false

hitl:
  enabled: true
  require_review: false
